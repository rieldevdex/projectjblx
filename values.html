  <!-- ── MAIN ─────────────────────────────────────────────── -->
  <main class="values-main">

<div class="values-toolbar" id="values-toolbar">

  <!-- ── Always-visible top bar ── -->
  <div class="toolbar-top">
    <div class="mode-toggle" role="group" aria-label="View mode">
      <button class="mode-btn active" data-mode="card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>Card
      </button>
      <button class="mode-btn" data-mode="changelog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>Changelog
      </button>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search items…" autocomplete="off" />
    </div>

    <button class="filter-toggle-btn" id="filter-toggle-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
      </svg>
      Filters
      <span class="filter-active-count" id="filter-active-count" style="display:none"></span>
    </button>

    <span class="item-count" id="item-count"></span>
  </div>

  <!-- ── Expandable filter panel ── -->
  <div class="filter-panel" id="filter-panel" style="display:none;">

    <!-- Type -->
    <div class="filter-group">
      <div class="filter-group-label">Type</div>
      <div class="filter-chips" id="fc-type">
        <button class="filter-chip active" data-filter="type" data-val="">All</button>
        <button class="filter-chip" data-filter="type" data-val="Vehicle">Vehicle</button>
        <button class="filter-chip" data-filter="type" data-val="Spoiler">Spoiler</button>
        <button class="filter-chip" data-filter="type" data-val="Texture">Texture</button>
        <button class="filter-chip" data-filter="type" data-val="Color">Color</button>
        <button class="filter-chip" data-filter="type" data-val="Rim">Rim</button>
        <button class="filter-chip" data-filter="type" data-val="Drift">Drift</button>
        <button class="filter-chip" data-filter="type" data-val="Horn">Horn</button>
        <button class="filter-chip" data-filter="type" data-val="Furniture">Furniture</button>
        <button class="filter-chip" data-filter="type" data-val="Tyre Style">Tyre Style</button>
        <button class="filter-chip" data-filter="type" data-val="Tyre Sticker">Tyre Sticker</button>
        <button class="filter-chip" data-filter="type" data-val="Weapon Skin">Weapon Skin</button>
      </div>
    </div>

    <!-- Demand -->
    <div class="filter-group">
      <div class="filter-group-label">Demand</div>
      <div class="filter-chips" id="fc-demand">
        <button class="filter-chip active" data-filter="demand" data-val="">All</button>
        <button class="filter-chip fcd-Extraordinary" data-filter="demand" data-val="Extraordinary">Extraordinary</button>
        <button class="filter-chip fcd-High"          data-filter="demand" data-val="High">High</button>
        <button class="filter-chip fcd-Solid"         data-filter="demand" data-val="Solid">Solid</button>
        <button class="filter-chip fcd-Average"       data-filter="demand" data-val="Average">Average</button>
        <button class="filter-chip fcd-Medium" data-filter="demand" data-val="Below Average">Below Average</button>
        <button class="filter-chip fcd-Low"           data-filter="demand" data-val="Low">Low</button>
        <button class="filter-chip fcd-Minimal"       data-filter="demand" data-val="Minimal">Minimal</button>
        <button class="filter-chip fcd-Nonexistent"   data-filter="demand" data-val="Nonexistent">Nonexistent</button>
      </div>
    </div>

    <!-- Trend -->
    <div class="filter-group">
      <div class="filter-group-label">Trend</div>
      <div class="filter-chips" id="fc-trend">
        <button class="filter-chip active" data-filter="trend" data-val="">All</button>
        <button class="filter-chip fct-Stable"  data-filter="trend" data-val="Stable">— Stable</button>
        <button class="filter-chip fct-Hyped"   data-filter="trend" data-val="Hyped">🔥 Hyped</button>
        <button class="filter-chip fct-Rising"  data-filter="trend" data-val="Rising">▲ Rising</button>
        <button class="filter-chip fct-Falling" data-filter="trend" data-val="Falling">▼ Falling</button>
        <button class="filter-chip fct-Hoarded"     data-filter="trend" data-val="Hoarded">📦 Hoarded</button>
        <button class="filter-chip fct-Manipulated" data-filter="trend" data-val="Manipulated">⚠️ Manipulated</button>
      </div>
    </div>

    <!-- Season — auto-populated by JS -->
    <div class="filter-group">
      <div class="filter-group-label">Season</div>
<div class="filter-chips" id="fc-season">
        <button class="filter-chip active" data-filter="season" data-val="">All</button>
      </div>
    </div>

    <!-- Tags — auto-populated by JS -->
    <div class="filter-group">
      <div class="filter-group-label">Tags</div>
      <div class="filter-chips" id="fc-tag">
        <button class="filter-chip active" data-filter="tag" data-val="">All</button>
      </div>
    </div>


<!-- Tiers -->
<div class="filter-group">
  <div class="filter-group-label">Tier</div>
  <div class="filter-chips" id="fc-tier">
    <button class="filter-chip active" data-filter="tier" data-val="">All</button>
    <button class="filter-chip" data-filter="tier" data-val="Max Tier">Max Tier</button>
    <button class="filter-chip" data-filter="tier" data-val="High Tier">High Tier</button>
    <button class="filter-chip" data-filter="tier" data-val="Mid Tier">Mid Tier</button>
    <button class="filter-chip" data-filter="tier" data-val="Low Tier">Low Tier</button>
    <button class="filter-chip" data-filter="tier" data-val="Very Low Tier">Very Low Tier</button>
  </div>
</div>

    <!-- Price Range + Obtainable toggle -->
    <div class="filter-bottom-row">
      <div class="filter-group" style="flex-direction:row;align-items:center;gap:10px;">
        <div class="filter-group-label" style="margin-bottom:0;white-space:nowrap;">Price Range</div>
        <div class="price-range-wrap">
          <input type="text" class="price-input" id="price-min" placeholder="Min e.g. 1M" autocomplete="off" />
          <span class="price-sep">—</span>
          <input type="text" class="price-input" id="price-max" placeholder="Max e.g. 50M" autocomplete="off" />
        </div>
      </div>

      <label class="obtainable-toggle-wrap" id="obtainable-toggle-wrap">
        <div class="toggle-switch" id="obtainable-toggle"></div>
        <span class="obtainable-toggle-label">Obtainable Only</span>
      </label>
    </div>

    <!-- Sort -->
    <div class="filter-group">
      <div class="filter-group-label">Sort By</div>
      <div class="sort-row" id="sort-chips">
        <button class="sort-chip active" data-sort="value">Value <span class="sort-arrow-icon" id="sa-value">↓</span></button>
        <button class="sort-chip" data-sort="name">Name <span class="sort-arrow-icon" id="sa-name">↕</span></button>
        <button class="sort-chip" data-sort="demand">Demand <span class="sort-arrow-icon" id="sa-demand">↕</span></button>
        <button class="sort-chip" data-sort="type">Type <span class="sort-arrow-icon" id="sa-type">↕</span></button>
      </div>
    </div>

    <!-- Footer -->
    <div class="filter-footer">
      <span class="active-filter-summary" id="active-filter-summary">No active filters</span>
      <button class="clear-filters-btn" id="clear-filters-btn">✕ Clear All</button>
    </div>

  </div><!-- /filter-panel -->
</div><!-- /values-toolbar -->

    <!-- Pagination (top) -->
    <div class="pagination" id="pagination" style="margin-bottom:16px;margin-top:4px;justify-content:flex-start;"></div>

    <!-- Card view -->
    <div id="card-view"></div>

    <!-- Changelog view -->
    <div id="changelog-view" style="display:none;padding:4px 0;"></div>

  </main>

  <!-- ── MODAL ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <div class="modal">

      <!-- Image + close -->
      <div class="modal-img-wrap">
        <img id="modal-img" src="" alt=""/>
        <div class="modal-img-fallback" id="modal-img-fallback"></div>
        <div class="modal-obtainable-strip" id="modal-obtainable-strip"></div>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>

      <div class="modal-content">

        <!-- Header: name + type -->
        <div class="modal-header">
          <div class="modal-name" id="modal-name"></div>
          <div class="modal-badge-group">
            <span class="modal-type" id="modal-type"></span>
          </div>
        </div>

        <!-- Stat grid -->
        <div class="modal-grid">
          <div class="modal-stat">
            <div class="modal-stat-label">Cash Value</div>
            <div class="modal-stat-value" id="modal-value"></div>
          </div>
          <div class="modal-stat" id="modal-duped-stat">
            <div class="modal-stat-label" id="modal-duped-label">Duped / Limited</div>
            <div class="modal-stat-value" id="modal-duped"></div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Demand</div>
            <div id="modal-demand"></div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Trend</div>
            <div id="modal-trend"></div>
          </div>
        </div>

        <div class="modal-divider"></div>

        <!-- Description -->
        <div class="modal-desc-label">Description</div>
        <p class="modal-desc" id="modal-desc"></p>

        <!-- Tags -->
        <div class="modal-desc-label" style="margin-top:12px;">Tags</div>
        <p class="modal-notes" id="modal-notes"></p>

        <!-- Remarks (hidden when empty) -->
        <div id="modal-remarks-section" class="modal-section" style="display:none;">
          <div class="modal-section-header">
            <span class="modal-section-icon remarks-icon"></span>
            <span class="modal-section-title remarks-title">Remarks</span>
          </div>
          <div class="modal-remarks" id="modal-remarks"></div>
        </div>

        <!-- Pull Value (hidden when empty) -->
        <div id="modal-pull-section" class="modal-section" style="display:none;">
          <div class="modal-section-header">
            <span class="modal-section-icon pull-icon"></span>
            <span class="modal-section-title pull-title">Trade Pull Value</span>
          </div>
          <div id="modal-pull-wrap"></div>
        </div>

        <!-- Last updated -->
        <div class="modal-updated">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
          Last updated: <span id="modal-updated-time" data-ts=""></span>
        </div>

      </div><!-- /modal-content -->
    </div><!-- /modal -->
  </div><!-- /modal-overlay -->

  <footer class="site-footer">
    <span>© 2025 JBLX — Jailbreak Listing Exchange</span>
    <span>Not affiliated with Badimo or Roblox</span>
  </footer>
