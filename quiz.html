<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Daily Quiz — JBLX</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/mobile-nav.css"/>
  <script src="js/theme.js"></script>
  <style>
/* ================================================================
   DAILY QUIZ PAGE
================================================================ */
.quiz-main {
  flex: 1;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
  padding: 32px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ── START SCREEN ───────────────────────────────────────────── */
.qs-start {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  text-align: center;
  padding: 12px 0;
  animation: fadeUp 0.4s var(--ease) both;
}
.qs-start-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-start-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
  line-height: 1;
  margin-top: 4px;
}
.qs-streak-bar {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-xl);
  overflow: hidden;
  width: 100%;
  max-width: 420px;
}
.qs-streak-block {
  flex: 1;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.qs-streak-block + .qs-streak-block {
  border-left: 1px solid var(--border);
}
.qs-streak-num {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  line-height: 1;
}
.qs-streak-label {
  font-family: var(--font-mono);
  font-size: 0.56rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px 24px;
  width: 100%;
  max-width: 420px;
}
.qs-info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.qs-info-cell {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 8px;
  text-align: center;
}
.qs-info-val {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.qs-info-lbl {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-info-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.6;
  text-align: center;
}
.qs-start-btn {
  padding: 18px 56px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--r-xl);
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(0,200,240,0.3);
  transition: opacity 0.15s, transform 0.15s;
}
.qs-start-btn:hover { opacity: 0.85; transform: translateY(-2px); }

/* ── QUESTION SCREEN ────────────────────────────────────────── */
.qs-progress-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.qs-progress-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.qs-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.5s var(--ease);
  box-shadow: 0 0 8px var(--accent);
}
.qs-progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.qs-q-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}
.qs-dots {
  display: flex;
  gap: 5px;
}
.qs-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--surface3);
  border: 1.5px solid var(--border-hi);
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.qs-dot.active  { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }
.qs-dot.correct { background: #39e07a; border-color: #39e07a; }
.qs-dot.wrong   { background: #e03040; border-color: #e03040; }

/* Trade card */
.qs-trade-card {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-xl);
  overflow: hidden;
  animation: fadeUp 0.25s var(--ease) both;
}
.qs-trade-layout {
  display: grid;
  grid-template-columns: 1fr 44px 1fr;
}
.qs-side {
  padding: 18px 16px;
}
.qs-side-lbl {
  font-family: var(--font-mono);
  font-size: 0.54rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.qs-side-lbl.give { color: var(--accent); }
.qs-side-lbl.get  { color: #ff7eb3; }
.qs-vs-col {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg3);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.qs-vs-text {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}
.qs-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 6px;
}
.qs-item:last-of-type { margin-bottom: 0; }
.qs-item-thumb {
  width: 38px; height: 30px;
  border-radius: 5px;
  overflow: hidden;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.qs-item-thumb img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 2px;
}
.qs-item-thumb-fb {
  font-family: var(--font-display);
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--accent);
  opacity: 0.55;
  letter-spacing: 0.04em;
}
.qs-item-body { flex: 1; min-width: 0; }
.qs-item-name {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.qs-item-row2 {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
.qs-item-val {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: #ffd166;
}
.qs-side-total {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 700;
  margin-top: 10px;
  padding: 5px 10px;
  border-radius: var(--r);
  display: inline-flex;
  border: 1px solid;
}
.qs-side-total.give { color: var(--accent); background: rgba(0,200,240,0.06); border-color: rgba(0,200,240,0.18); }
.qs-side-total.get  { color: #ff7eb3; background: rgba(255,126,179,0.06); border-color: rgba(255,126,179,0.18); }

/* Answer buttons */
.qs-btn-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}
.qbtn {
  padding: 14px 8px 12px;
  border-radius: var(--r-lg);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 2px solid;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: transform 0.15s var(--ease), box-shadow 0.15s, opacity 0.15s;
  font-size: 0.95rem;
}
.qbtn-hint {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.06em;
  text-transform: none;
  opacity: 0.65;
  font-weight: 400;
}
.qbtn:not(:disabled):hover { transform: translateY(-3px); }
.qbtn:not(:disabled):active { transform: translateY(0) scale(0.97); }
.qbtn:disabled { cursor: not-allowed; }
.qbtn.win  { background: rgba(57,224,122,0.08);  border-color: #39e07a; color: #39e07a; }
.qbtn.fair { background: rgba(90,96,128,0.08);   border-color: #5a6080; color: #9aa0bc; }
.qbtn.lose { background: rgba(224,48,64,0.08);   border-color: #e03040; color: #e03040; }
.qbtn.win:not(:disabled):hover  { box-shadow: 0 6px 20px rgba(57,224,122,0.25); }
.qbtn.fair:not(:disabled):hover { box-shadow: 0 6px 20px rgba(90,96,128,0.18); }
.qbtn.lose:not(:disabled):hover { box-shadow: 0 6px 20px rgba(224,48,64,0.25); }
/* Post-answer states */
.qbtn.is-answer     { opacity: 1 !important; box-shadow: 0 0 0 3px currentColor, 0 0 16px rgba(currentColor, 0.3); }
.qbtn.is-dim        { opacity: 0.22 !important; }
.qbtn.is-wrong-pick { opacity: 0.22 !important; filter: grayscale(0.4); }

/* Feedback panel */
.qs-feedback {
  border-top: 1px solid var(--border);
  padding: 16px 18px;
  animation: fadeUp 0.22s var(--ease) both;
}
.qs-fb-verdict {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}
.qs-fb-verdict.correct { color: #39e07a; }
.qs-fb-verdict.wrong   { color: #e03040; }
.qs-fb-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.fb-cell {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 10px;
  text-align: center;
}
.fb-cell-val {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.fb-cell-lbl {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-fb-threshold {
  font-size: 0.77rem;
  color: var(--text-dim);
  line-height: 1.55;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 12px;
  margin-bottom: 12px;
}
.qs-fb-threshold strong { color: var(--text); }
.qs-next-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--r-lg);
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.qs-next-btn:hover { opacity: 0.85; transform: translateY(-1px); }

/* ── RESULT SCREEN ──────────────────────────────────────────── */
.qs-result {
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp 0.35s var(--ease) both;
}
.qs-result-hdr {
  text-align: center;
}
.qs-result-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
}
.qs-result-date {
  font-family: var(--font-mono);
  font-size: 0.64rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}
.qs-result-main {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.qs-wordle-row {
  display: flex;
  gap: 8px;
}
.wq {
  width: 54px; height: 54px;
  border-radius: 10px;
  border: 2px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  animation: flipIn 0.35s var(--ease) both;
}
@keyframes flipIn {
  from { transform: scaleY(0); opacity: 0; }
  to   { transform: scaleY(1); opacity: 1; }
}
.wq.correct { background: rgba(57,224,122,0.12); border-color: #39e07a; }
.wq.wrong   { background: rgba(224,48,64,0.12);  border-color: #e03040; }
.qs-big-score {
  font-family: var(--font-display);
  font-size: 4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
  line-height: 1;
}
.qs-big-score span { font-size: 1.8rem; color: var(--text-muted); }
.qs-score-lbl {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-grade {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: 0.06em;
}

/* Streak result */
.qs-streak-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.qs-streak-icon { font-size: 2.4rem; }
.qs-streak-body { flex: 1; }
.qs-streak-num {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.qs-streak-lbl {
  font-family: var(--font-mono);
  font-size: 0.56rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 2px 0 4px;
}
.qs-streak-msg { font-size: 0.76rem; color: var(--text-dim); }
.qs-best-wrap { text-align: right; }
.qs-best-num {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-dim);
}
.qs-best-lbl {
  font-family: var(--font-mono);
  font-size: 0.54rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* Countdown */
.qs-countdown {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 16px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.qs-countdown-lbl {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.qs-countdown-time {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
}
.qs-countdown-note {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-muted);
  text-align: right;
  line-height: 1.6;
  letter-spacing: 0.04em;
}

/* Share button */
.qs-share-btn {
  width: 100%;
  padding: 14px;
  background: var(--surface2);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-lg);
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.qs-share-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
.qs-share-btn.copied { color: #39e07a; border-color: #39e07a; background: rgba(57,224,122,0.06); }

/* Trade review table */
.qs-review {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
}
.qs-review-hdr {
  padding: 12px 18px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border-hi);
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.qs-review-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.qs-review-row:last-child { border-bottom: none; }
.qs-review-row:hover { background: var(--surface2); }
.qs-rv-num {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  width: 20px;
  flex-shrink: 0;
}
.qs-rv-icon { font-size: 1rem; flex-shrink: 0; }
.qs-rv-trade {
  flex: 1;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-dim);
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.qs-rv-verdict {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
  flex-shrink: 0;
}
.qs-rv-verdict.c { color: #39e07a; }
.qs-rv-verdict.w { color: #e03040; }

/* Already-played screen */
.qs-done-banner {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: var(--r-xl);
  padding: 24px;
  text-align: center;
  animation: scaleIn 0.3s var(--ease) both;
}
.qs-done-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
  margin-bottom: 6px;
}
.qs-done-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
}

@media (max-width: 540px) {
  .qs-trade-layout { grid-template-columns: 1fr; }
  .qs-vs-col { display: none; }
  .qs-fb-stats { grid-template-columns: 1fr 1fr; }
  .qbtn { padding: 12px 6px; font-size: 0.88rem; }
  .wq { width: 46px; height: 46px; font-size: 1.2rem; }
  .qs-big-score { font-size: 3rem; }
  .qs-streak-result { flex-wrap: wrap; }
}
  </style>
</head>

  <main class="quiz-main" id="quiz-root"></main>

  <script src="js/values.js"></script>
  <script>
// ================================================================
//  JBLX DAILY TRADE QUIZ  —  Seeded by date, Wordle-style streak
// ================================================================

const QUIZ_KEY   = 'jblx_dq_v2';
const Q_COUNT    = 5;
const PASS_SCORE = 3;

// ── SEEDED PRNG (Mulberry32) ─────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── DATE HELPERS ─────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayLabel() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
function dateSeed() {
  const k = todayKey();
  let h = 2166136261 >>> 0;
  for (let i = 0; i < k.length; i++) { h ^= k.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return h;
}
function msToMidnight() {
  const n = new Date(), m = new Date(n); m.setHours(24, 0, 0, 0); return m - n;
}
function fmtCountdown(ms) {
  const h = Math.floor(ms / 3600000),
        m = Math.floor((ms % 3600000) / 60000),
        s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── VERDICT ──────────────────────────────────────────────────
function verdict(pct) {
  if (pct >= 8)  return { btn: 'W', display: 'Win',         detail: 'You gain 8%+ — a clear profit.' };
  if (pct >= 2)  return { btn: 'W', display: 'Slight Win',  detail: 'You gain 2–8% — marginally ahead.' };
  if (pct >= -2) return { btn: 'F', display: 'Fair',        detail: 'Within ±2% — essentially equal.' };
  if (pct >= -8) return { btn: 'L', display: 'Slight Lose', detail: 'You lose 2–8% — slightly unfavourable.' };
  return         { btn: 'L', display: 'Lose',               detail: 'You lose 8%+ — a clear disadvantage.' };
}

// ── FORMAT ───────────────────────────────────────────────────
function fmt(n) {
  if (typeof fmtValue === 'function') return fmtValue(n);
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return String(n);
}

// ── GENERATE DAILY TRADES (seeded) ───────────────────────────
function genTrades() {
  const pool = (typeof ITEMS !== 'undefined' ? ITEMS : [])
    .filter(i => i.value >= 1000000 && i.value <= 30000000);
  if (pool.length < 8) return [];
  const rng = mulberry32(dateSeed());

  const trades = [];
  let attempts = 0;

  while (trades.length < Q_COUNT && attempts < 600) {
    attempts++;
    const gc = Math.floor(rng() * 2) + 1;
    const rc = Math.floor(rng() * 2) + 1;
    const give = Array.from({ length: gc }, () => pool[Math.floor(rng() * pool.length)]);
    const get  = Array.from({ length: rc }, () => pool[Math.floor(rng() * pool.length)]);

    // No duplicate item names across both sides
    const allNames = [...give, ...get].map(i => i.name);
    if (new Set(allNames).size !== allNames.length) continue;

    const offer = give.reduce((s, i) => s + i.value, 0);
    const req   = get.reduce((s, i)  => s + i.value, 0);
    if (offer === 0) continue;

    const pct = ((req - offer) / offer) * 100;

    // Keep value gap tight enough to make demand matter
    if (Math.abs(pct) > 14) continue;

    trades.push({ give, get, offer, req, pct, ...verdict(pct) });
  }

  return trades;
}

const TRADES = genTrades();

// ── STORAGE ──────────────────────────────────────────────────
function load() { try { return JSON.parse(localStorage.getItem(QUIZ_KEY)) || {}; } catch { return {}; } }
function save(d) { try { localStorage.setItem(QUIZ_KEY, JSON.stringify(d)); } catch {} }

// ── DEMAND BADGE ─────────────────────────────────────────────
const DEM_CLASS = { Extraordinary:'d-extraordinary', High:'d-high', Solid:'d-solid', Average:'d-average', Medium:'d-medium', Low:'d-low', Minimal:'d-minimal', Nonexistent:'d-nonexistent' };
function demBadge(d) {
  if (!d) return '';
  return `<span class="badge-demand ${DEM_CLASS[d]||'d-nonexistent'}" style="font-size:0.5rem;padding:1px 6px;">${d}</span>`;
}

// ── ITEM THUMB ────────────────────────────────────────────────
function thumb(item) {
  const src = item.img || item.image || '';
  if (src) return `<img src="${src}" alt="" onerror="this.outerHTML='<span class=\\'qs-item-thumb-fb\\'>${(item.name||'').slice(0,2).toUpperCase()}</span>'" />`;
  return `<span class="qs-item-thumb-fb">${(item.name||'').slice(0,2).toUpperCase()}</span>`;
}

// ── ITEM HTML ─────────────────────────────────────────────────
function itemHtml(item) {
  return `
    <div class="qs-item">
      <div class="qs-item-thumb">${thumb(item)}</div>
      <div class="qs-item-body">
        <div class="qs-item-name">${item.name}</div>
        <div class="qs-item-row2">
          <span class="qs-item-val">${fmt(item.value)}</span>
          ${demBadge(item.demand)}
        </div>
      </div>
    </div>`;
}

// ── SESSION STATE ─────────────────────────────────────────────
let S = { phase: 'start', qIdx: 0, answers: [], correct: [] };

// ── ROOT RENDER ───────────────────────────────────────────────
const root = document.getElementById('quiz-root');
function render() {
  const data = load();
  if (data.date === todayKey() && data.done) { renderDone(data); return; }
  if (S.phase === 'start')    renderStart(data);
  else if (S.phase === 'q')   renderQ(S.qIdx);
  else if (S.phase === 'end') renderResult();
}

// ── START SCREEN ──────────────────────────────────────────────
function renderStart(data) {
  const streak = data.streak || 0;
  const best   = data.best || 0;
  const streakColor = streak >= 3 ? '#ff9f43' : streak > 0 ? 'var(--accent)' : 'var(--text-dim)';

  root.innerHTML = `
    <div class="qs-start">
      <div>
        <div class="qs-start-eyebrow">Jailbreak Listing Exchange</div>
        <div class="qs-start-title">${streak >= 3 ? '🔥 ' : '🎯 '}Daily Trade Quiz</div>
        <div style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-top:6px;">${todayLabel()}</div>
      </div>

      <div class="qs-streak-bar">
        <div class="qs-streak-block">
          <div class="qs-streak-num" style="color:${streakColor}">${streak > 0 ? '🔥 ' : ''}${streak}</div>
          <div class="qs-streak-label">Day Streak</div>
        </div>
        <div class="qs-streak-block">
          <div class="qs-streak-num" style="color:var(--text-dim)">${best}</div>
          <div class="qs-streak-label">Best Streak</div>
        </div>
      </div>

      <div class="qs-info-card">
        <div class="qs-info-grid">
          <div class="qs-info-cell">
            <div class="qs-info-val" style="color:var(--accent)">${Q_COUNT}</div>
            <div class="qs-info-lbl">Trades</div>
          </div>
          <div class="qs-info-cell">
            <div class="qs-info-val" style="color:#39e07a">${PASS_SCORE}+</div>
            <div class="qs-info-lbl">To Pass</div>
          </div>
          <div class="qs-info-cell">
            <div class="qs-info-val" style="color:#ffd166">W·F·L</div>
            <div class="qs-info-lbl">Format</div>
          </div>
        </div>
        <p class="qs-info-desc">
          Same 5 trades for everyone today — seeded by date.<br/>
          Get ${PASS_SCORE}+ correct to keep your streak alive.
        </p>
      </div>

      <button class="qs-start-btn" onclick="startQuiz()">Begin Today's Quiz →</button>
    </div>`;
}

function startQuiz() {
  S = { phase: 'q', qIdx: 0, answers: [], correct: [] };
  render();
}

// ── QUESTION ──────────────────────────────────────────────────
function renderQ(idx) {
  const t = TRADES[idx];
  const answered = S.answers[idx] !== undefined;

  const dotHtml = TRADES.map((_, i) => {
    let cls = 'qs-dot';
    if (i < S.correct.length) cls += S.correct[i] ? ' correct' : ' wrong';
    else if (i === idx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const pct = t.pct;
  const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
  const diff = Math.abs(t.req - t.offer);
  const favourable = t.req >= t.offer;

  // Button state classes
  function btnClass(b) {
    if (!answered) return '';
    if (b === t.btn) return 'is-answer';
    if (b === S.answers[idx] && S.answers[idx] !== t.btn) return 'is-wrong-pick';
    return 'is-dim';
  }

  const feedbackHtml = answered ? `
    <div class="qs-feedback">
      <div class="qs-fb-verdict ${S.correct[idx] ? 'correct' : 'wrong'}">
        ${S.correct[idx] ? '✓ Correct!' : '✗ Wrong!'} — ${t.display}
      </div>
      <div class="qs-fb-stats">
        <div class="fb-cell">
          <div class="fb-cell-val" style="color:${pct>=0?'#39e07a':'#e03040'}">${pctStr}</div>
          <div class="fb-cell-lbl">Net %</div>
        </div>
        <div class="fb-cell">
          <div class="fb-cell-val">${fmt(diff)}</div>
          <div class="fb-cell-lbl">Difference</div>
        </div>
        <div class="fb-cell">
          <div class="fb-cell-val" style="color:${favourable?'#39e07a':'#e03040'};font-size:0.65rem">${favourable?'Your Favour':'Against You'}</div>
          <div class="fb-cell-lbl">Direction</div>
        </div>
      </div>
      <div class="qs-fb-threshold"><strong>${t.display}</strong> — ${t.detail}</div>
      <button class="qs-next-btn" onclick="nextQ()">
        ${idx + 1 < Q_COUNT ? `Next Trade → (${idx+2}/${Q_COUNT})` : 'See Results →'}
      </button>
    </div>` : '';

  root.innerHTML = `
    <div class="qs-progress-wrap">
      <div class="qs-progress-bar">
        <div class="qs-progress-fill" style="width:${(idx/Q_COUNT)*100}%"></div>
      </div>
      <div class="qs-progress-meta">
        <div class="qs-q-label">Trade ${idx+1} of ${Q_COUNT}</div>
        <div class="qs-dots">${dotHtml}</div>
      </div>
    </div>

    <div class="qs-trade-card">
      <div class="qs-trade-layout">
        <div class="qs-side">
          <div class="qs-side-lbl give">You Give</div>
          ${t.give.map(itemHtml).join('')}
          <div class="qs-side-total give">Total: ${fmt(t.offer)}</div>
        </div>
        <div class="qs-vs-col"><div class="qs-vs-text">VS</div></div>
        <div class="qs-side">
          <div class="qs-side-lbl get">You Get</div>
          ${t.get.map(itemHtml).join('')}
          <div class="qs-side-total get">Total: ${fmt(t.req)}</div>
        </div>
      </div>

      <div class="qs-btn-row">
        <button class="qbtn win ${btnClass('W')}" ${answered?'disabled':''} onclick="ans('W')">
          Win <span class="qbtn-hint">+8% or more</span>
        </button>
        <button class="qbtn fair ${btnClass('F')}" ${answered?'disabled':''} onclick="ans('F')">
          Fair <span class="qbtn-hint">within ±2%</span>
        </button>
        <button class="qbtn lose ${btnClass('L')}" ${answered?'disabled':''} onclick="ans('L')">
          Lose <span class="qbtn-hint">-8% or worse</span>
        </button>
      </div>
      ${feedbackHtml}
    </div>`;
}

function ans(choice) {
  if (S.answers[S.qIdx] !== undefined) return;
  const correct = choice === TRADES[S.qIdx].btn;
  S.answers[S.qIdx] = choice;
  S.correct[S.qIdx] = correct;
  renderQ(S.qIdx);
}

function nextQ() {
  S.qIdx++;
  if (S.qIdx >= Q_COUNT) { finishQuiz(); return; }
  renderQ(S.qIdx);
}

// ── FINISH + SAVE ────────────────────────────────────────────
function finishQuiz() {
  const score  = S.correct.filter(Boolean).length;
  const passed = score >= PASS_SCORE;
  const data   = load();

  const yd = new Date(); yd.setDate(yd.getDate() - 1);
  const yKey = `${yd.getFullYear()}-${String(yd.getMonth()+1).padStart(2,'0')}-${String(yd.getDate()).padStart(2,'0')}`;
  const streakAlive = data.date === yKey;

  const newStreak = passed ? (streakAlive ? (data.streak || 0) + 1 : 1) : 0;
  const newBest   = Math.max(data.best || 0, newStreak);

  save({ date: todayKey(), score, correct: S.correct, answers: S.answers, streak: newStreak, best: newBest, passed, done: true });

  S.phase = 'end';
  render();
}

// ── RESULT SCREEN ────────────────────────────────────────────
function renderResult() { renderDone(load()); }

function renderDone(data) {
  const score  = data.score || 0;
  const corr   = data.correct || [];
  const streak = data.streak || 0;
  const best   = data.best || 0;
  const passed = data.passed;
  const pct    = Math.round((score / Q_COUNT) * 100);

  let grade, gradeColor;
  if (pct === 100)    { grade = '🏆 Perfect Score';       gradeColor = '#ffd166'; }
  else if (pct >= 80) { grade = '📈 Expert Trader';       gradeColor = '#39e07a'; }
  else if (pct >= 60) { grade = '⚖️ Skilled Trader';      gradeColor = 'var(--accent)'; }
  else if (pct >= 40) { grade = '📉 Rookie Trader'; gradeColor = '#e07820'; }
  else                { grade = '❌ Keep Studying';        gradeColor = '#e03040'; }

  const squares = corr.map((c, i) => `<div class="wq ${c?'correct':'wrong'}" style="animation-delay:${i*0.08}s">${c?'✓':'✗'}</div>`).join('');
  const emojiRow = corr.map(c => c ? '🟩' : '🟥').join('');
  const shareText = `JBLX Daily Trade Quiz 🎯\n${todayLabel()}\n${emojiRow} ${score}/${Q_COUNT}\nStreak: ${streak} 🔥\njblx.net/quiz.html`;

  const reviewRows = TRADES.map((t, i) => {
    const c = corr[i];
    const ps = (t.pct >= 0 ? '+' : '') + t.pct.toFixed(1) + '%';
    const desc = `${t.give.map(x=>x.name).join(' + ')} → ${t.get.map(x=>x.name).join(' + ')}`;
    const shortDesc = desc.length > 44 ? desc.slice(0,44)+'…' : desc;
    return `
      <div class="qs-review-row">
        <div class="qs-rv-num">#${i+1}</div>
        <div class="qs-rv-icon">${c ? '✅' : '❌'}</div>
        <div class="qs-rv-trade" title="${desc}">${shortDesc}</div>
        <div class="qs-rv-verdict ${c?'c':'w'}">${t.display} (${ps})</div>
      </div>`;
  }).join('');

  root.innerHTML = `
    <div class="qs-result">
      <div class="qs-result-hdr">
        <div class="qs-result-title">Daily Quiz Complete</div>
        <div class="qs-result-date">${todayLabel()}</div>
      </div>

      <div class="qs-result-main">
        <div class="qs-wordle-row">${squares}</div>
        <div>
          <div class="qs-big-score">${score}<span>/${Q_COUNT}</span></div>
          <div class="qs-score-lbl">Correct Answers</div>
        </div>
        <div class="qs-grade" style="color:${gradeColor}">${grade}</div>
      </div>

      <div class="qs-streak-result">
        <div class="qs-streak-icon">${streak > 0 ? '🔥' : '💔'}</div>
        <div class="qs-streak-body">
          <div class="qs-streak-num" style="color:${streak>0?'#ff9f43':'var(--text-muted)'}">${streak}</div>
          <div class="qs-streak-lbl">Day Streak</div>
          <div class="qs-streak-msg">
            ${passed
              ? (streak > 1 ? `You're on a ${streak}-day streak — come back tomorrow!` : 'Streak started — keep it going!')
              : 'Streak reset — pass next time to rebuild!'}
          </div>
        </div>
        <div class="qs-best-wrap">
          <div class="qs-best-num">${best}</div>
          <div class="qs-best-lbl">Best</div>
        </div>
      </div>

      <div class="qs-countdown">
        <div>
          <div class="qs-countdown-lbl">Next Quiz In</div>
          <div class="qs-countdown-time" id="qcd">--:--:--</div>
        </div>
        <div class="qs-countdown-note">New trades daily<br/>Same seed for everyone</div>
      </div>

      <button class="qs-share-btn" id="qs-share-btn" onclick="doShare()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share Result
      </button>

      <div class="qs-review">
        <div class="qs-review-hdr">Trade Review — Today's Answers</div>
        ${reviewRows}
      </div>
    </div>`;

  // Countdown
  const cdEl = document.getElementById('qcd');
  function tick() { if (cdEl) cdEl.textContent = fmtCountdown(msToMidnight()); }
  tick(); setInterval(tick, 1000);

  // Share
  window.doShare = function() {
    const btn = document.getElementById('qs-share-btn');
    function copied() {
      btn.textContent = '✓ Copied to clipboard!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share Result`; btn.classList.remove('copied'); }, 2500);
    }
    if (navigator.share) {
      navigator.share({ title: 'JBLX Trade Quiz', text: shareText }).catch(() => {
        navigator.clipboard.writeText(shareText).then(copied).catch(() => alert(shareText));
      });
    } else {
      navigator.clipboard.writeText(shareText).then(copied).catch(() => alert(shareText));
    }
  };
}

// ── BOOT ─────────────────────────────────────────────────────
render();
  </script>
  <script src="js/mobile-nav.js"></script>
